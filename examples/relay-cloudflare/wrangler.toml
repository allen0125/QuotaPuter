# QuotaPuter relay — Cloudflare Worker config.
# Deploy: `npx wrangler deploy` (gives an https://<name>.<subdomain>.workers.dev URL
# with a publicly-trusted cert, which the Cardputer requires).
# Secrets are NOT stored here — set them with `wrangler secret put` (see README).
name = "quotaputer-relay"
main = "src/index.js"
compatibility_date = "2024-11-01"

# IMPORTANT for OpenAI/ChatGPT from blocked regions (Hong Kong / mainland China):
# a Worker's outbound fetch egresses from the data center where it runs, and by
# default that's the one nearest your device. Pin it near Tokyo so egress is a
# Japan IP (OpenAI/ChatGPT geo-block HK & CN; Japan is supported).
# Alternatives: "gcp:asia-northeast1", "azure:japaneast".
[placement]
region = "aws:ap-northeast-1"

# KV namespace that caches + rotates the ChatGPT OAuth tokens for the /codex
# (ChatGPT/Codex plan usage) route. Only needed if you use /codex.
# Create it once:  wrangler kv namespace create TOKENS
# then paste the printed id below.
[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
